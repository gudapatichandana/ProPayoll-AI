<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProPayroll AI | Global Automation Simulator</title>
    <meta name="description" content="Automate global payroll compliance and logic with ProPayroll AI. Simulate tax, bonus, and deductions across regions." />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo">
          <div id="logo-icon"></div>
          <h1 class="logo-text">ProPayroll AI</h1>
        </div>
        
        <nav class="nav-links">
          <a class="nav-item active" data-view="dashboard" id="nav-dashboard">
            <span class="nav-icon" id="icon-dashboard"></span>
            Payroll Dashboard
          </a>
          <a class="nav-item" data-view="builder" id="nav-builder">
            <span class="nav-icon" id="icon-plus"></span>
            Build Pipeline
          </a>
          <a class="nav-item" data-view="analytics" id="nav-analytics">
            <span class="nav-icon" id="icon-analytics"></span>
            Data Analytics
          </a>
          <a class="nav-item" data-view="cases" id="nav-cases">
            <span class="nav-icon" id="icon-cases"></span>
            Client Case Study
          </a>
          <a class="nav-item" data-view="logs" id="nav-logs">
            <span class="nav-icon" id="icon-logs"></span>
            System Logs
          </a>
          
          <div style="margin-top: 1.5rem; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: var(--radius-md);">
            <p class="text-secondary" style="font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem;">Access Role</p>
            <select id="role-switcher" style="width: 100%; padding: 0.4rem; font-size: 0.75rem;" onchange="app.setRole(this.value)">
              <option value="admin">Super Admin</option>
              <option value="support">Support Level 1</option>
              <option value="client">Client Auditor</option>
            </select>
          </div>

          <a class="nav-item" id="nav-config" onclick="ConfigManager.toggle()" style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
            <svg style="margin-right: 0.75rem" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Import/Export JSON
          </a>
        </nav>

        <div style="margin-top: auto;">
          <div class="glass" style="padding: 1rem; font-size: 0.85rem;">
            <p class="text-secondary">v1.0.4 Premium</p>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header>
          <div id="header-title">
            <h2 class="title-font" id="view-title">Dashboard</h2>
            <p class="text-secondary" id="view-subtitle">Manage your automated workflows</p>
          </div>
          <div id="header-actions">
            <button class="btn btn-primary" id="btn-create-header">
              <span id="icon-plus-header"></span>
              New Workflow
            </button>
          </div>
        </header>

        <section id="content-area" class="animate-fade">
          <!-- View content will be injected here -->
        </section>
      </main>
    </div>

    <!-- Modals / Toast Container -->
    <div id="toast-container" style="position: fixed; bottom: 2rem; right: 2rem; z-index: 1000;"></div>

    <div id="config-manager-container"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
